name: Full Codebase Semgrep Audit

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  semgrep-full-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep@sha256:326e5f41cc972bb423b764a14febbb62bbad29ee1c01820805d077dd868fea48
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Run Full Semgrep Scan
        run: semgrep scan --config="p/default" --error
